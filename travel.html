  .iframe-section {
    position: relative;
    background: #000;
  }
  .iframe-section iframe {
    width: 100%;

    text-align: center;
    gap: 16px;
    padding: 32px;

    background: #e94560;

  /* ── URL 해시 디코딩 (base64url + zlib) ── */
  async function decodeTravelData(encoded) {
    // URL-safe base64 → standard base64
    const b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    const pad = (4 - b64.length % 4) % 4;
    const binaryStr = atob(b64 + '='.repeat(pad));
    const bytes = Uint8Array.from(binaryStr, c => c.charCodeAt(0));

    // zlib decompress ('deflate' format includes the zlib header wrapper)
    const ds = new DecompressionStream('deflate');
    const writer = ds.writable.getWriter();
    writer.write(bytes);
    writer.close();

    const chunks = [];
    const reader = ds.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((s, c) => s + c.length, 0);
    const out = new Uint8Array(total);
    let offset = 0;
    for (const c of chunks) { out.set(c, offset); offset += c.length; }
    return new TextDecoder().decode(out);
  }

  /* ── 일정표 렌더링 ── */
  function renderSchedule(data) {
    const el = document.getElementById('schedule-output');

    // 타이틀
    const title = data.title || data.name || '';
    let html = title ? `<p style="color:#555;margin-bottom:18px;">📌 ${escHtml(title)}</p>` : '';

    // days 배열 또는 최상위 places 배열 처리
    const days = data.days || data.schedules || data.itinerary || (data.places ? [{ places: data.places }] : null);

    if (!days || !Array.isArray(days) || days.length === 0) {
      // 구조를 알 수 없으면 raw JSON 표시
      el.innerHTML = `<div class="decode-error">
        일정 구조를 자동으로 파싱하지 못했습니다.<br>
        <a href="https://travel.hspace.site/#${TRAVEL_HASH}" target="_blank">원본 링크</a>에서 확인해주세요.
        <details style="margin-top:12px;text-align:left">
          <summary style="cursor:pointer;color:#888;font-size:0.8rem">원시 데이터 보기</summary>
          <pre style="font-size:0.75rem;overflow:auto;max-height:300px;margin-top:8px">${escHtml(JSON.stringify(data, null, 2))}</pre>
        </details>
      </div>`;
      return;
    }

    days.forEach(function (day, dayIdx) {
      const dayNum   = day.day || day.date || (dayIdx + 1);
      const dayLabel = day.label || day.name || day.title || '';
      const places   = day.places || day.spots || day.schedule || day.items || [];

      html += `<div class="day-card">
        <div class="day-card-header">
          <span class="day-badge">Day ${dayIdx + 1}</span>
          ${escHtml(String(dayNum))}${dayLabel ? ' — ' + escHtml(dayLabel) : ''}
        </div>
        <table class="schedule-table">
          <thead><tr>
            <th>#</th>
            <th>장소</th>
            <th>시간</th>
            <th>지도</th>
          </tr></thead>
          <tbody>`;

      if (!Array.isArray(places) || places.length === 0) {
        html += `<tr><td colspan="4" style="color:#aaa;text-align:center;padding:20px;">장소 정보 없음</td></tr>`;
      } else {
        places.forEach(function (p, pIdx) {
          const name = p.name || p.title || p.place || '(이름 없음)';
          const memo = p.memo || p.note || p.description || p.desc || '';
          const time = p.time || p.startTime || p.start_time || '';
          const lat  = p.lat  || p.latitude  || '';
          const lng  = p.lng  || p.lon || p.longitude || '';

          const mapHref = (lat && lng)
            ? `https://www.google.com/maps?q=${encodeURIComponent(lat)},${encodeURIComponent(lng)}`
            : '';

          html += `<tr>
            <td><span class="order-num">${pIdx + 1}</span></td>
            <td>
              <div class="place-name">${escHtml(name)}</div>
              ${memo ? `<div class="place-memo">${escHtml(memo)}</div>` : ''}
            </td>
            <td>${time ? `<span class="time-badge">${escHtml(time)}</span>` : '<span style="color:#ccc">—</span>'}</td>
            <td>${mapHref
              ? `<a class="map-link" href="${mapHref}" target="_blank">지도 ↗</a>`
              : '<span style="color:#ccc">—</span>'}</td>
          </tr>`;
        });
      }
      html += `</tbody></table></div>`;
    });

    el.innerHTML = html;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── iframe 차단 감지 ── */
  function detectIframeBlock() {
    const iframe = document.getElementById('travel-iframe');
    // load 이벤트가 발생하면 일단 성공으로 간주 (cross-origin이라 내부 체크 불가)
    // 3초 후에도 load가 안 됐으면 차단으로 판단
    let loaded = false;
    iframe.addEventListener('load', function () { loaded = true; });
    setTimeout(function () {
      if (!loaded) {
        iframe.style.display = 'none';
        document.getElementById('iframe-blocked').classList.add('show');
      }
    }, 5000);
  }

  /* ── 초기화 ── */
  async function init() {
    detectIframeBlock();
    const json = await decodeTravelData(TRAVEL_HASH);
    const data = JSON.parse(json);
    renderSchedule(data);
  }

  document.addEventListener('DOMContentLoaded', init);
